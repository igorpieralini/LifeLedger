<div class="app-shell" [class.collapsed]="collapsed">

  <ll-sidebar (collapsedChange)="onCollapsedChange($event)"></ll-sidebar>

  <!-- Mobile backdrop — only rendered when nav is open, hidden on desktop via CSS -->
  <div class="nav-backdrop" *ngIf="!collapsed" (click)="closeNav()" aria-hidden="true"></div>

  <div class="main-wrapper">
    <ll-header></ll-header>

    <main class="main-area">
      <div class="main-inner">
        <router-outlet />
      </div>
    </main>

    <ll-footer></ll-footer>
  </div>

</div>
