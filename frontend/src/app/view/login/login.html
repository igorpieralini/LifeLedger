<div class="login">
  <div class="login__theme">
    <atom-change-theme />
  </div>

  <div class="login__card">
    <div class="login__brand">
      <atom-icon name="auto_stories" size="xl" color="var(--color-primary)" />
      <atom-heading [level]="3">LifeLedger</atom-heading>
    </div>

    <atom-heading [level]="5">
      {{ isRegister() ? 'Criar Conta' : 'Entrar' }}
    </atom-heading>

    @if (errorMsg()) {
      <div class="login__error">
        <atom-icon name="error" size="sm" color="var(--color-danger)" />
        <atom-text color="danger">{{ errorMsg() }}</atom-text>
      </div>
    }

    <div class="login__form">
      @if (isRegister()) {
        <atom-input
          label="Nome"
          name="name"
          type="text"
          placeholder="Seu nome"
          [required]="true"
          [(value)]="name"
        />
      }

      <atom-input
        label="Email"
        name="email"
        type="email"
        placeholder="seu@email.com"
        [required]="true"
        [(value)]="email"
      />

      <atom-input
        label="Senha"
        name="password"
        type="password"
        placeholder="Sua senha"
        [required]="true"
        [(value)]="password"
      />

      <atom-button
        [label]="isRegister() ? 'Criar Conta' : 'Entrar'"
        variant="primary"
        size="lg"
        [loading]="loading()"
        [disabled]="loading()"
        (clicked)="submit()"
      />
    </div>

    <div class="login__toggle">
      <atom-text variant="caption" color="muted">
        {{ isRegister() ? 'Já tem uma conta?' : 'Não tem uma conta?' }}
      </atom-text>
      <atom-button
        [label]="isRegister() ? 'Entrar' : 'Criar Conta'"
        variant="ghost"
        size="sm"
        (clicked)="toggleMode()"
      />
    </div>
  </div>
</div>
