<div class="master">
  <shared-header
    [userName]="userName()"
    [userEmail]="userEmail()"
    [sidebarCollapsed]="sidebarCollapsed()"
    (toggleSidebar)="onToggleSidebar()"
    (logout)="onLogout()"
  />

  <div class="master__middle" [class.master__middle--collapsed]="sidebarCollapsed()">
    <shared-sidebar
      [groups]="sidebarGroups"
      [collapsed]="sidebarCollapsed()"
    />

    <main class="master__content">
      <router-outlet />
    </main>
  </div>

  <shared-footer />
</div>
