<div class="select" [class.select--error]="error()" [class.select--disabled]="disabled()">
  @if (label()) {
    <label class="select__label" [attr.for]="name()">
      {{ label() }}
      @if (required()) { <span class="select__required">*</span> }
    </label>
  }

  <select
    class="select__field"
    [name]="name()"
    [disabled]="disabled()"
    [required]="required()"
    [(ngModel)]="value"
    (ngModelChange)="changed.emit($event)"
  >
    @if (placeholder()) {
      <option value="" disabled>{{ placeholder() }}</option>
    }
    @for (opt of options(); track opt.value) {
      <option [value]="opt.value" [disabled]="opt.disabled ?? false">{{ opt.label }}</option>
    }
  </select>

  @if (error()) {
    <span class="select__error">{{ error() }}</span>
  }
</div>
