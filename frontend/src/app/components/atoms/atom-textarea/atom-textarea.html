<div class="textarea-wrapper" [class.textarea-wrapper--error]="error()">
  @if (label()) {
    <label class="textarea-wrapper__label" [attr.for]="name()">
      {{ label() }}
      @if (required()) { <span class="textarea-wrapper__required">*</span> }
    </label>
  }
  <textarea
    class="textarea-wrapper__field"
    [name]="name()"
    [placeholder]="placeholder()"
    [rows]="rows()"
    [disabled]="disabled()"
    [required]="required()"
    [attr.maxlength]="maxlength()"
    [(ngModel)]="value"
    (blur)="blurred.emit($event)"
  ></textarea>
  @if (error()) {
    <span class="textarea-wrapper__error">{{ error() }}</span>
  }
</div>
