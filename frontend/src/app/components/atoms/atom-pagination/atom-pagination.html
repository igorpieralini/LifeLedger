@if (totalPages() > 1) {
  <div class="pagination">
    <atom-button variant="ghost" size="sm" [disabled]="currentPage() === 0" (clicked)="prevPage()">
      <atom-icon name="chevron_left" size="sm" />
    </atom-button>

    @for (p of visiblePages(); track p) {
      <button
        class="pagination__page"
        [class.pagination__page--active]="p === currentPage()"
        (click)="goToPage(p)"
      >
        {{ p + 1 }}
      </button>
    }

    <atom-button variant="ghost" size="sm" [disabled]="currentPage() === totalPages() - 1" (clicked)="nextPage()">
      <atom-icon name="chevron_right" size="sm" />
    </atom-button>
  </div>
}
