@switch (level()) {
  @case (1) { <h1 [class]="'heading heading--1 heading--' + color()"><ng-content /></h1> }
  @case (2) { <h2 [class]="'heading heading--2 heading--' + color()"><ng-content /></h2> }
  @case (3) { <h3 [class]="'heading heading--3 heading--' + color()"><ng-content /></h3> }
  @case (4) { <h4 [class]="'heading heading--4 heading--' + color()"><ng-content /></h4> }
  @case (5) { <h5 [class]="'heading heading--5 heading--' + color()"><ng-content /></h5> }
  @case (6) { <h6 [class]="'heading heading--6 heading--' + color()"><ng-content /></h6> }
}
