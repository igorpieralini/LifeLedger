<section class="feedback" [class.feedback--loading]="mode() === 'loading'" aria-live="polite">
  @if (mode() === 'loading') {
    <atom-spinner size="lg" />
  } @else {
    <atom-icon [name]="icon()" size="xl" color="var(--color-muted)" />
  }

  @if (title()) {
    <atom-heading [level]="5">{{ title() }}</atom-heading>
  }

  @if (description()) {
    <atom-text color="muted">{{ description() }}</atom-text>
  }

  <div class="feedback__actions">
    <ng-content />
  </div>
</section>
