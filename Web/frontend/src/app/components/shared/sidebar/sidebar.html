<aside class="sidebar">
  <nav class="sidebar__nav">
    <a class="nav-item"
       routerLink="/dash"
       routerLinkActive="nav-item--active">
      <span class="material-symbols-rounded nav-item__icon">dashboard</span>
      <span class="nav-item__label">Dash</span>
    </a>

    <div class="sidebar__divider"></div>

    <span class="sidebar__section-title">Metas</span>

    @for (cat of categoryRoutes; track cat.path) {
      <a class="nav-item"
         [routerLink]="cat.path"
         routerLinkActive="nav-item--active"
         [style.--nav-color]="cat.color">
        <span class="material-symbols-rounded nav-item__icon">{{ cat.icon }}</span>
        <span class="nav-item__label">{{ cat.label }}</span>
      </a>
    }

    <div class="sidebar__divider"></div>

    <span class="sidebar__section-title">Regras</span>

    @for (rule of ruleRoutes; track rule.path) {
      <a class="nav-item"
         [routerLink]="rule.path"
         routerLinkActive="nav-item--active"
         [style.--nav-color]="rule.color">
        <span class="material-symbols-rounded nav-item__icon">{{ rule.icon }}</span>
        <span class="nav-item__label">{{ rule.label }}</span>
      </a>
    }
  </nav>
</aside>
