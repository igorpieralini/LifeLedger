spring:
  config:
    import:
      - optional:file:../config.yml
      - optional:file:./config.yml

  output:
    ansi:
      enabled: always

  application:
    name: lifeledger

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

logging:
  level:
    com.lifeledger: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %msg%n"

lifeledger:
  cors:
    allowed-origins: http://localhost:4200
  jwt:
    secret: bGlmZWxlZGdlci1kZXYtc2VjcmV0LWtleS0yNTYtYml0cw==
    expiration-ms: 86400000
  database:
    host: localhost
    port: 5432
    name: lifeledger
    username: postgres
    password: postgres
    auto-create: true
    pool:
      minimum-idle: 2
      maximum-pool-size: 10

