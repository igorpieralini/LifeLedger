# ─────────────────────────────────────────────────────────────────────────────
# LifeLedger — Application Configuration
#
# Este arquivo define a ESTRUTURA da configuração.
# Os VALORES vêm do config.yml externo (importado abaixo).
#
# Hierarquia de precedência (maior → menor):
#   1. Variáveis de ambiente
#   2. config.yml externo
#   3. Este arquivo (fallbacks)
# ─────────────────────────────────────────────────────────────────────────────

spring:
  config:
    # Importa config.yml da raiz do projeto (../config.yml relativo ao backend/)
    # "optional:" previne erro se o arquivo não existir — usa os defaults abaixo
    import:
      - optional:file:../config.yml
      - optional:file:./config.yml

  application:
    name: lifeledger

  # ── Multipart (CSV / PDF upload) ───────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

  # ── JPA ────────────────────────────────────────────────────────────────────
  # ddl-auto: none — Flyway owns the schema. Hibernate must not validate because
  # after the V4 migration, enum columns are VARCHAR and Hibernate's schema
  # metadata check would report a mismatch with the old column definitions.
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  # ── Flyway ─────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # ── Jackson ────────────────────────────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ─── Servidor ─────────────────────────────────────────────────────────────────
server:
  port: ${lifeledger.app.port:8080}
  servlet:
    context-path: ${lifeledger.app.context-path:/api}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.lifeledger: ${lifeledger.logging.level.app:INFO}
    org.springframework.security: ${lifeledger.logging.level.security:WARN}
    org.flywaydb: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %msg%n"
