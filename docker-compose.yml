version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lifeledger-db
    environment:
      POSTGRES_DB: lifeledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - lifeledger_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lifeledger_data:
